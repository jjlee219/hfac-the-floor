<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE FLOOR — Trade</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #07090c;
    --surface: #0d1017;
    --border: #1a1e28;
    --border-light: #252a36;
    --text: #d0d4dc;
    --text-dim: #6b7280;
    --text-bright: #f0f2f5;
    --green: #00ff88;
    --green-dim: #0a3d22;
    --red: #ff3366;
    --red-dim: #3d0a1a;
    --blue: #38bdf8;
    --purple: #818cf8;
    --yellow: #fbbf24;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --display: 'Space Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ══ JOIN SCREEN ══ */
  #joinScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  #joinScreen h1 {
    font-family: var(--display);
    font-size: 2.5rem;
    color: var(--text-bright);
    margin-bottom: 0.25rem;
  }

  #joinScreen .sub { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 2rem; }

  #joinScreen input {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 1.2rem;
    padding: 0.8rem 1.2rem;
    text-align: center;
    width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }

  #joinScreen input:focus { border-color: var(--green); }

  #joinScreen button {
    margin-top: 1rem;
    background: var(--green);
    color: #07090c;
    border: none;
    border-radius: 10px;
    font-family: var(--display);
    font-size: 1rem;
    font-weight: 700;
    padding: 0.8rem 2.5rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  #joinScreen button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,255,136,0.2); }

  /* ══ TRADING SCREEN ══ */
  #tradeScreen { display: none; min-height: 100vh; }

  /* ── Header ── */
  .trade-header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0.8rem 1.2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .match-score {
    font-family: var(--mono);
    font-size: 1.3rem;
    font-weight: 700;
  }

  .match-score .sa { color: var(--green); }
  .match-score .sb { color: var(--red); }
  .match-score .dash { color: var(--text-dim); margin: 0 0.3rem; }

  .match-names {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .header-center {
    text-align: center;
  }

  .prob-display {
    font-family: var(--mono);
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-bright);
    line-height: 1;
  }

  .prob-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .header-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.2rem;
  }

  .timer-hdr {
    font-family: var(--mono);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text-bright);
  }

  .timer-hdr.warning { color: var(--yellow); }
  .timer-hdr.critical { color: var(--red); animation: blink 0.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

  .pnl-hdr {
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 700;
  }
  .pnl-pos { color: var(--green); }
  .pnl-neg { color: var(--red); }
  .pnl-zero { color: var(--text-dim); }

  /* ── Main Layout ── */
  .trade-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: calc(100vh - 72px);
  }

  @media (max-width: 700px) {
    .trade-body {
      grid-template-columns: 1fr;
      height: auto;
    }
  }

  /* ── Left Panel: Order Book + Controls ── */
  .left-panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  /* ── Order Book ── */
  .book-section {
    flex: 1;
    padding: 0.8rem;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .book-section h3 {
    font-family: var(--display);
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .book-header {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    padding: 0.2rem 0.4rem;
    letter-spacing: 0.05em;
  }

  .book-header span:nth-child(2) { text-align: center; }
  .book-header span:nth-child(3) { text-align: right; }

  .book-asks, .book-bids {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .book-asks { justify-content: flex-end; }

  .book-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.2rem 0.4rem;
    position: relative;
  }

  .book-row span:nth-child(2) { text-align: center; font-weight: 700; }
  .book-row span:nth-child(3) { text-align: right; }

  .book-row.ask-row { color: var(--red); }
  .book-row.bid-row { color: var(--green); }

  .book-row .depth-bar {
    position: absolute;
    top: 0; bottom: 0;
    opacity: 0.08;
    pointer-events: none;
  }

  .ask-row .depth-bar { right: 0; background: var(--red); }
  .bid-row .depth-bar { left: 0; background: var(--green); }

  .book-spread {
    text-align: center;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    padding: 0.3rem 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* ── Trading Controls ── */
  .controls-section {
    padding: 0.8rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .qty-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }

  .qty-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .qty-btn {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    width: 36px;
    height: 36px;
    border: 1px solid var(--border-light);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qty-btn:hover { border-color: var(--text-dim); }
  .qty-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(56,189,248,0.08); }

  .qty-display {
    font-family: var(--mono);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-bright);
    min-width: 40px;
    text-align: center;
  }

  .trade-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }

  .trade-btn {
    font-family: var(--display);
    font-size: 0.85rem;
    font-weight: 700;
    padding: 1rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.12s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
    position: relative;
    overflow: hidden;
  }

  .trade-btn .price-hint {
    font-size: 0.65rem;
    opacity: 0.7;
    font-weight: 400;
  }

  .btn-buy {
    background: linear-gradient(135deg, #059669, #047857);
    color: #f0fdf4;
  }

  .btn-buy:hover { background: linear-gradient(135deg, #10b981, #059669); transform: translateY(-1px); }
  .btn-buy:active { transform: translateY(1px); }

  .btn-sell {
    background: linear-gradient(135deg, #dc2626, #b91c1c);
    color: #fef2f2;
  }

  .btn-sell:hover { background: linear-gradient(135deg, #ef4444, #dc2626); transform: translateY(-1px); }
  .btn-sell:active { transform: translateY(1px); }

  .trade-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none !important;
  }

  .cashout-row {
    margin-top: 0.5rem;
  }

  .btn-cashout {
    width: 100%;
    font-family: var(--display);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.65rem 1rem;
    border: 1.5px solid var(--border-light);
    border-radius: 8px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .btn-cashout:hover { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,0.05); }
  .btn-cashout:active { transform: scale(0.98); }
  .btn-cashout:disabled { opacity: 0.25; cursor: not-allowed; transform: none !important; }

  .btn-cashout .cashout-detail {
    font-size: 0.65rem;
    opacity: 0.7;
    font-weight: 400;
  }

  /* ── Position Summary ── */
  .position-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px solid var(--border);
  }

  .pos-item {
    text-align: center;
  }

  .pos-item .label {
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.15rem;
  }

  .pos-item .value {
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-bright);
  }

  /* ── Right Panel: Chart + Feed ── */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chart-section {
    flex: 1;
    padding: 0.8rem;
    min-height: 200px;
    position: relative;
  }

  .chart-section h3 {
    font-family: var(--display);
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  #priceChart {
    width: 100%;
    height: calc(100% - 24px);
    display: block;
  }

  /* ── Trade Feed ── */
  .feed-section {
    height: 180px;
    padding: 0.8rem;
    border-top: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .feed-section h3 {
    font-family: var(--display);
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .feed-list {
    flex: 1;
    overflow-y: auto;
  }

  .feed-item {
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 0.2rem 0;
    display: flex;
    gap: 0.6rem;
  }

  .feed-item .time { color: var(--text-dim); min-width: 36px; }
  .feed-item.buy { color: var(--green); }
  .feed-item.sell { color: var(--red); }
  .feed-item.event { color: var(--yellow); }

  /* ── Leaderboard Section ── */
  .leaderboard-section {
    height: 160px;
    padding: 0.8rem;
    border-top: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .leaderboard-section h3 {
    font-family: var(--display);
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .lb-list { flex: 1; overflow-y: auto; }

  .lb-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.2rem 0;
  }

  .lb-row .rank { color: var(--text-dim); min-width: 24px; }
  .lb-row .name { color: var(--text); flex: 1; }
  .lb-row.me .name { color: var(--blue); font-weight: 700; }

  /* ══ SETTLEMENT OVERLAY ══ */
  .settlement-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(7,9,12,0.92);
    backdrop-filter: blur(10px);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .settlement-overlay.active { display: flex; }

  .settlement-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    text-align: center;
    max-width: 500px;
    width: 100%;
  }

  .settlement-card .winner-text {
    font-family: var(--display);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 0.5rem;
  }

  .settlement-card .final-score {
    font-family: var(--mono);
    font-size: 3rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
  }

  .settlement-card .your-pnl {
    font-family: var(--mono);
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
  }

  .settlement-lb {
    text-align: left;
    width: 100%;
  }

  .settlement-lb h4 {
    font-family: var(--display);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .slb-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 0.35rem 0;
    border-bottom: 1px solid var(--border);
  }

  .slb-row.me { color: var(--blue); font-weight: 700; }
  .slb-row .rank { min-width: 30px; color: var(--text-dim); }

  .settlement-dismiss {
    margin-top: 1.5rem;
    background: var(--border-light);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 0.6rem 2rem;
    font-family: var(--display);
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .settlement-dismiss:hover { background: var(--border); }

  /* ── Flash Feedback ── */
  .flash-trade {
    position: fixed;
    top: 72px; left: 0; right: 0;
    height: 3px;
    z-index: 150;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .flash-trade.buy-flash { background: var(--green); opacity: 1; }
  .flash-trade.sell-flash { background: var(--red); opacity: 1; }

  /* ── Market closed banner ── */
  .market-closed-banner {
    display: none;
    text-align: center;
    font-family: var(--display);
    font-size: 0.8rem;
    color: var(--yellow);
    padding: 0.4rem;
    background: rgba(251,191,36,0.06);
    border-bottom: 1px solid rgba(251,191,36,0.15);
    letter-spacing: 0.05em;
  }

  .market-closed-banner.visible { display: block; }
</style>
</head>
<body>

<!-- ═════ JOIN SCREEN ═════ -->
<div id="joinScreen">
  <h1>THE FLOOR</h1>
  <div class="sub">Live Prediction Market</div>
  <input id="nameInput" placeholder="Your name" maxlength="20" autofocus />
  <button onclick="joinGame()">ENTER THE FLOOR</button>
</div>

<!-- ═════ TRADING SCREEN ═════ -->
<div id="tradeScreen">
  <div class="market-closed-banner" id="marketBanner">MARKET CLOSED — WAITING FOR GAME</div>

  <div class="trade-header">
    <div class="header-left">
      <div>
        <div class="match-score">
          <span class="sa" id="hScoreA">0</span><span class="dash">—</span><span class="sb" id="hScoreB">0</span>
        </div>
        <div class="match-names"><span id="hNameA">A</span> vs <span id="hNameB">B</span></div>
      </div>
    </div>
    <div class="header-center">
      <div class="prob-display" id="hProb">50%</div>
      <div class="prob-label"><span id="hProbPlayer">A</span> wins</div>
    </div>
    <div class="header-right">
      <div class="timer-hdr" id="hTimer">1:30</div>
      <div class="pnl-hdr pnl-zero" id="hPnl">$0.00</div>
    </div>
  </div>

  <div class="trade-body">
    <!-- LEFT: Book + Controls -->
    <div class="left-panel">
      <div class="book-section">
        <h3>Order Book</h3>
        <div class="book-header"><span>SIZE</span><span>PRICE</span><span>SIZE</span></div>
        <div class="book-asks" id="bookAsks"></div>
        <div class="book-spread" id="bookSpread">Spread: —</div>
        <div class="book-bids" id="bookBids"></div>
      </div>

      <div class="controls-section">
        <div class="qty-row">
          <span class="qty-label">QTY</span>
          <button class="qty-btn" onclick="setQty(1)">1</button>
          <button class="qty-btn active" onclick="setQty(2)">2</button>
          <button class="qty-btn" onclick="setQty(3)">3</button>
          <button class="qty-btn" onclick="setQty(5)">5</button>
          <button class="qty-btn" onclick="setQty(10)">10</button>
        </div>
        <div class="trade-buttons">
          <button class="trade-btn btn-buy" id="btnBuy" onclick="submitTrade('buy')">
            BUY <span id="hNameBuyA">A</span> WINS
            <span class="price-hint" id="buyHint">@ —</span>
          </button>
          <button class="trade-btn btn-sell" id="btnSell" onclick="submitTrade('sell')">
            BUY <span id="hNameSellB">B</span> WINS
            <span class="price-hint" id="sellHint">@ —</span>
          </button>
        </div>
        <div class="cashout-row">
          <button class="btn-cashout" id="btnCashout" onclick="cashOut()" disabled>
            CASH OUT — <span id="cashoutDetail">No position</span>
          </button>
        </div>
        <div class="position-bar">
          <div class="pos-item"><div class="label">Position</div><div class="value" id="posQty">0</div></div>
          <div class="pos-item"><div class="label">Avg Entry</div><div class="value" id="posAvg">—</div></div>
          <div class="pos-item"><div class="label">Cash</div><div class="value" id="posCash">$500</div></div>
          <div class="pos-item"><div class="label">Unreal P&L</div><div class="value" id="posUpnl">$0.00</div></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Chart + Feed + Leaderboard -->
    <div class="right-panel">
      <div class="chart-section">
        <h3>Price Chart</h3>
        <canvas id="priceChart"></canvas>
      </div>
      <div class="feed-section">
        <h3>Trade Feed</h3>
        <div class="feed-list" id="feedList"></div>
      </div>
      <div class="leaderboard-section">
        <h3>Leaderboard</h3>
        <div class="lb-list" id="lbList"></div>
      </div>
    </div>
  </div>
</div>

<!-- SETTLEMENT OVERLAY -->
<div class="settlement-overlay" id="settlementOverlay">
  <div class="settlement-card">
    <div class="winner-text" id="sWinner">—</div>
    <div class="final-score" id="sFinalScore">0 — 0</div>
    <div class="your-pnl" id="sYourPnl">$0.00</div>
    <div class="settlement-lb">
      <h4>Final Standings</h4>
      <div id="sLeaderboard"></div>
    </div>
    <button class="settlement-dismiss" onclick="dismissSettlement()">CLOSE</button>
  </div>
</div>

<div class="flash-trade" id="tradeFlash"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// ═══ State ═══
let myTrader = null;
let myName = '';
let qty = 2;
let gameState = {};
let book = { bids: [], asks: [], mid: 0.5 };
let priceHistory = [];
let tradeLog = [];
let chartCanvas, chartCtx;

// ═══ Join ═══
function joinGame() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  myName = name;
  socket.emit('joinTrader', { name });
}

document.getElementById('nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') joinGame();
});

socket.on('traderJoined', (trader) => {
  myTrader = trader;
  document.getElementById('joinScreen').style.display = 'none';
  document.getElementById('tradeScreen').style.display = 'block';
  chartCanvas = document.getElementById('priceChart');
  chartCtx = chartCanvas.getContext('2d');
  resizeChart();
  window.addEventListener('resize', resizeChart);
});

// ═══ Game State ═══
let lastKnownStatus = 'waiting';
socket.on('gameState', (state) => {
  // Detect reset: if we transition back to 'waiting', clear everything
  if (state.status === 'waiting' && lastKnownStatus !== 'waiting') {
    priceHistory = [];
    tradeLog = [];
    if (chartCtx && chartCanvas) {
      chartCtx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);
    }
    renderFeed();
    document.getElementById('settlementOverlay').classList.remove('active');
  }
  lastKnownStatus = state.status;
  gameState = state;

  document.getElementById('hScoreA').textContent = state.scoreA;
  document.getElementById('hScoreB').textContent = state.scoreB;
  document.getElementById('hNameA').textContent = state.playerAName;
  document.getElementById('hNameB').textContent = state.playerBName;
  document.getElementById('hNameBuyA').textContent = state.playerAName;
  document.getElementById('hNameSellB').textContent = state.playerBName;

  const prob = Math.round(state.fairValue * 100);
  document.getElementById('hProb').textContent = `${prob}%`;
  if (prob >= 50) {
    document.getElementById('hProbPlayer').textContent = state.playerAName;
  } else {
    document.getElementById('hProbPlayer').textContent = state.playerBName;
  }

  // Timer
  const t = Math.max(0, state.timeRemaining);
  const mins = Math.floor(t / 60);
  const secs = Math.floor(t % 60);
  const timerEl = document.getElementById('hTimer');
  timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
  timerEl.className = 'timer-hdr' + (t < 10 ? ' critical' : t < 20 ? ' warning' : '');

  // Market banner
  const banner = document.getElementById('marketBanner');
  const tradeable = state.status === 'live' || state.status === 'pre-game';
  banner.classList.toggle('visible', !tradeable && state.status !== 'settled');
  banner.textContent = state.status === 'waiting' ? 'MARKET CLOSED — WAITING FOR GAME' :
                        state.status === 'paused' ? 'MARKET PAUSED' : 'MARKET CLOSED';

  // Disable buttons if market closed
  document.getElementById('btnBuy').disabled = !tradeable;
  document.getElementById('btnSell').disabled = !tradeable;
  updateCashoutButton();

  // Record price for chart
  if (state.status === 'live' && myTrader) {
    const elapsed = state.totalDuration - state.timeRemaining;
    priceHistory.push({ time: elapsed, price: state.fairValue });
    drawChart();
  }

  // Goal events → feed
  if (state.events && state.events.length > tradeLog.filter(x => x.type === 'event').length) {
    for (let i = tradeLog.filter(x => x.type === 'event').length; i < state.events.length; i++) {
      tradeLog.push({ type: 'event', ...state.events[i] });
    }
    renderFeed();
  }
});

// ═══ Book ═══
socket.on('bookUpdate', (b) => {
  book = b;
  renderBook();

  // Update price hints
  const askPrice = book.asks.length > 0 ? book.asks[0].price : null;
  const bidPrice = book.bids.length > 0 ? book.bids[0].price : null;
  document.getElementById('buyHint').textContent = askPrice !== null ? `@ $${askPrice.toFixed(2)}` : '@ —';
  document.getElementById('sellHint').textContent = bidPrice !== null ? `@ $${bidPrice.toFixed(2)}` : '@ —';

  updateCashoutButton();
});

function renderBook() {
  const asksEl = document.getElementById('bookAsks');
  const bidsEl = document.getElementById('bookBids');
  const spreadEl = document.getElementById('bookSpread');

  const maxSize = Math.max(...book.asks.map(a => a.size), ...book.bids.map(b => b.size), 1);

  // Asks (reversed so best ask is at bottom)
  const askRows = book.asks.slice(0, 6).reverse();
  asksEl.innerHTML = askRows.map(a => {
    const pct = (a.size / maxSize * 60);
    return `<div class="book-row ask-row">
      <div class="depth-bar" style="width:${pct}%"></div>
      <span></span><span>$${a.price.toFixed(2)}</span><span>${a.size}</span>
    </div>`;
  }).join('');

  // Bids
  const bidRows = book.bids.slice(0, 6);
  bidsEl.innerHTML = bidRows.map(b => {
    const pct = (b.size / maxSize * 60);
    return `<div class="book-row bid-row">
      <div class="depth-bar" style="width:${pct}%"></div>
      <span>${b.size}</span><span>$${b.price.toFixed(2)}</span><span></span>
    </div>`;
  }).join('');

  // Spread
  if (book.bestBid !== null && book.bestAsk !== null) {
    const spread = ((book.bestAsk - book.bestBid) * 100).toFixed(0);
    spreadEl.textContent = `Spread: ${spread}¢ · Mid: $${book.mid.toFixed(2)}`;
  }
}

// ═══ Trader Update ═══
socket.on('traderUpdate', (data) => {
  myTrader = data;

  // PnL in header
  const pnlEl = document.getElementById('hPnl');
  const sign = data.pnl >= 0 ? '+' : '';
  pnlEl.textContent = `${sign}$${data.pnl.toFixed(2)}`;
  pnlEl.className = 'pnl-hdr ' + (data.pnl > 0 ? 'pnl-pos' : data.pnl < 0 ? 'pnl-neg' : 'pnl-zero');

  // Position bar
  document.getElementById('posQty').textContent = data.position > 0 ? `+${data.position}` : data.position;
  document.getElementById('posQty').style.color = data.position > 0 ? 'var(--green)' : data.position < 0 ? 'var(--red)' : 'var(--text-dim)';
  document.getElementById('posAvg').textContent = data.totalBought > 0 || data.totalSold > 0 ?
    `$${(Math.abs(data.costBasis) / Math.max(data.totalBought, data.totalSold, 1) / 100).toFixed(2)}` : '—';
  document.getElementById('posCash').textContent = `$${data.cash.toFixed(0)}`;
  document.getElementById('posUpnl').textContent = `${sign}$${data.pnl.toFixed(2)}`;
  document.getElementById('posUpnl').style.color = data.pnl > 0 ? 'var(--green)' : data.pnl < 0 ? 'var(--red)' : 'var(--text-dim)';

  updateCashoutButton();
});

// ═══ Fills ═══
socket.on('fill', (fill) => {
  if (fill.buyerId === myTrader?.id) {
    tradeLog.push({ type: 'trade', side: 'buy', price: fill.price, size: fill.size, time: fill.timeInGame });
    flashTrade('buy');
  } else if (fill.sellerId === myTrader?.id) {
    tradeLog.push({ type: 'trade', side: 'sell', price: fill.price, size: fill.size, time: fill.timeInGame });
    flashTrade('sell');
  }
  renderFeed();
});

function renderFeed() {
  const el = document.getElementById('feedList');
  const items = tradeLog.slice(-20).reverse();
  el.innerHTML = items.map(item => {
    if (item.type === 'event') {
      return `<div class="feed-item event"><span class="time">${item.time?.toFixed(0) || '0'}s</span><span>⚽ ${item.description}</span></div>`;
    }
    const sideLabel = item.side === 'buy' ? 'BUY' : 'SELL';
    return `<div class="feed-item ${item.side}"><span class="time">${item.time?.toFixed(0) || '0'}s</span><span>${sideLabel} ${item.size} @ $${item.price.toFixed(2)}</span></div>`;
  }).join('');
}

// ═══ Leaderboard ═══
socket.on('leaderboard', (lb) => {
  const el = document.getElementById('lbList');
  el.innerHTML = lb.map((t, i) => {
    const isMe = t.name === myName;
    const pnlClass = t.pnl > 0 ? 'pnl-pos' : t.pnl < 0 ? 'pnl-neg' : 'pnl-zero';
    const sign = t.pnl >= 0 ? '+' : '';
    return `<div class="lb-row${isMe ? ' me' : ''}">
      <span class="rank">#${i + 1}</span>
      <span class="name">${t.name}${isMe ? ' (you)' : ''}</span>
      <span class="${pnlClass}">${sign}$${t.pnl.toFixed(2)}</span>
    </div>`;
  }).join('');
});

// ═══ Settlement ═══
socket.on('settlement', (data) => {
  const overlay = document.getElementById('settlementOverlay');
  overlay.classList.add('active');

  const winnerName = data.winner === 'A' ? gameState.playerAName :
                     data.winner === 'B' ? gameState.playerBName : 'DRAW';
  document.getElementById('sWinner').textContent = data.winner === 'draw' ? 'DRAW' : `${winnerName} WINS!`;
  document.getElementById('sWinner').style.color = data.winner === 'A' ? 'var(--green)' : data.winner === 'B' ? 'var(--red)' : 'var(--yellow)';

  document.getElementById('sFinalScore').innerHTML =
    `<span style="color:var(--green)">${gameState.scoreA}</span> <span style="color:var(--text-dim)">—</span> <span style="color:var(--red)">${gameState.scoreB}</span>`;

  const myResult = data.leaderboard.find(t => t.name === myName);
  if (myResult) {
    const sign = myResult.pnl >= 0 ? '+' : '';
    const pnlColor = myResult.pnl > 0 ? 'var(--green)' : myResult.pnl < 0 ? 'var(--red)' : 'var(--text-dim)';
    document.getElementById('sYourPnl').textContent = `${sign}$${myResult.pnl.toFixed(2)}`;
    document.getElementById('sYourPnl').style.color = pnlColor;
  }

  document.getElementById('sLeaderboard').innerHTML = data.leaderboard.map((t, i) => {
    const isMe = t.name === myName;
    const pnlClass = t.pnl > 0 ? 'pnl-pos' : t.pnl < 0 ? 'pnl-neg' : 'pnl-zero';
    const sign = t.pnl >= 0 ? '+' : '';
    return `<div class="slb-row${isMe ? ' me' : ''}">
      <span class="rank">#${i + 1}</span>
      <span>${t.name}${isMe ? ' (you)' : ''}</span>
      <span class="${pnlClass}">${sign}$${t.pnl.toFixed(2)}</span>
    </div>`;
  }).join('');
});

function dismissSettlement() {
  document.getElementById('settlementOverlay').classList.remove('active');
}

// ═══ Trading ═══
function setQty(n) {
  qty = n;
  document.querySelectorAll('.qty-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.textContent) === n);
  });
}

function submitTrade(side) {
  if (!myTrader) return;
  socket.emit('submitOrder', { side, type: 'market', size: qty });
}

function cashOut() {
  if (!myTrader || myTrader.position === 0) return;
  const pos = myTrader.position;
  if (pos > 0) {
    // Long — sell to close
    socket.emit('submitOrder', { side: 'sell', type: 'market', size: Math.abs(pos) });
  } else {
    // Short — buy to close
    socket.emit('submitOrder', { side: 'buy', type: 'market', size: Math.abs(pos) });
  }
}

function updateCashoutButton() {
  const btn = document.getElementById('btnCashout');
  const detail = document.getElementById('cashoutDetail');
  const tradeable = gameState.status === 'live' || gameState.status === 'pre-game';

  if (!myTrader || myTrader.position === 0 || !tradeable) {
    btn.disabled = true;
    detail.textContent = myTrader && myTrader.position !== 0 ? `${Math.abs(myTrader.position)} contracts (market closed)` : 'No position';
    return;
  }

  btn.disabled = false;
  const pos = myTrader.position;
  const side = pos > 0 ? 'SELL' : 'BUY';
  const price = pos > 0 ?
    (book.bids.length > 0 ? book.bids[0].price : book.mid) :
    (book.asks.length > 0 ? book.asks[0].price : book.mid);
  const estProceeds = Math.abs(pos) * price * 100;
  detail.textContent = `${side} ${Math.abs(pos)} @ ~$${price.toFixed(2)} (~$${estProceeds.toFixed(0)})`;
}

socket.on('orderError', (data) => {
  // Brief visual error
  console.warn('Order error:', data.message);
});

// ═══ Visual Feedback ═══
function flashTrade(side) {
  const el = document.getElementById('tradeFlash');
  el.className = `flash-trade ${side}-flash`;
  setTimeout(() => { el.className = 'flash-trade'; }, 200);
}

// ═══ Price Chart ═══
function resizeChart() {
  if (!chartCanvas) return;
  const rect = chartCanvas.parentElement.getBoundingClientRect();
  chartCanvas.width = rect.width;
  chartCanvas.height = rect.height - 24;
  drawChart();
}

function drawChart() {
  if (!chartCtx || priceHistory.length < 2) return;

  const W = chartCanvas.width;
  const H = chartCanvas.height;
  const ctx = chartCtx;

  ctx.clearRect(0, 0, W, H);

  const pad = { top: 10, right: 40, bottom: 20, left: 10 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const totalDuration = gameState.totalDuration || 90;

  // Y axis: 0 to 1 (probability)
  const yMin = 0, yMax = 1;
  const toX = (t) => pad.left + (t / totalDuration) * cw;
  const toY = (p) => pad.top + (1 - (p - yMin) / (yMax - yMin)) * ch;

  // Grid lines
  ctx.strokeStyle = '#1a1e28';
  ctx.lineWidth = 1;
  for (let p = 0; p <= 1; p += 0.25) {
    const y = toY(p);
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();

    ctx.fillStyle = '#3a3f4b';
    ctx.font = '10px JetBrains Mono';
    ctx.textAlign = 'left';
    ctx.fillText(`${Math.round(p * 100)}%`, W - pad.right + 4, y + 3);
  }

  // 50% line (dashed)
  ctx.strokeStyle = '#252a36';
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(pad.left, toY(0.5));
  ctx.lineTo(W - pad.right, toY(0.5));
  ctx.stroke();
  ctx.setLineDash([]);

  // Price line
  ctx.strokeStyle = '#38bdf8';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < priceHistory.length; i++) {
    const x = toX(priceHistory[i].time);
    const y = toY(priceHistory[i].price);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Fill area under/over 0.5
  ctx.globalAlpha = 0.06;
  ctx.beginPath();
  for (let i = 0; i < priceHistory.length; i++) {
    const x = toX(priceHistory[i].time);
    const y = toY(priceHistory[i].price);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  const lastX = toX(priceHistory[priceHistory.length - 1].time);
  ctx.lineTo(lastX, toY(0.5));
  ctx.lineTo(toX(priceHistory[0].time), toY(0.5));
  ctx.closePath();
  ctx.fillStyle = '#38bdf8';
  ctx.fill();
  ctx.globalAlpha = 1;

  // Goal event markers
  if (gameState.events) {
    for (const evt of gameState.events) {
      const x = toX(evt.time);
      ctx.strokeStyle = evt.player === 'A' ? '#00ff88' : '#ff3366';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(x, pad.top);
      ctx.lineTo(x, H - pad.bottom);
      ctx.stroke();
      ctx.setLineDash([]);

      // Label
      ctx.fillStyle = evt.player === 'A' ? '#00ff88' : '#ff3366';
      ctx.font = 'bold 9px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.fillText('⚽', x, pad.top - 2);
    }
  }

  // Current price dot
  if (priceHistory.length > 0) {
    const last = priceHistory[priceHistory.length - 1];
    const x = toX(last.time);
    const y = toY(last.price);
    ctx.fillStyle = '#38bdf8';
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ═══ Keyboard shortcuts for trading ═══
document.addEventListener('keydown', (e) => {
  if (!myTrader) return;
  if (e.target.tagName === 'INPUT') return;

  if (e.key === 'ArrowUp' || e.key === 'w') {
    e.preventDefault();
    submitTrade('buy');
  } else if (e.key === 'ArrowDown' || e.key === 's') {
    e.preventDefault();
    submitTrade('sell');
  } else if (e.key === '1') setQty(1);
  else if (e.key === '2') setQty(2);
  else if (e.key === '3') setQty(3);
  else if (e.key === '5') setQty(5);
  else if (e.key === 'c' || e.key === 'C') cashOut();
});
</script>
